<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- fundo quadrado arredondado escuro -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>

  <!-- arco do velocímetro (fundo cinza) -->
  <path
    d="M 6.5 22 A 11 11 0 1 1 25.5 22"
    fill="none"
    stroke="#222"
    stroke-width="2.8"
    stroke-linecap="round"
  />

  <!-- arco de progresso (dourado) -->
  <path
    d="M 6.5 22 A 11 11 0 1 1 25.5 22"
    fill="none"
    stroke="#c8a96e"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-dasharray="51 5"
    stroke-dashoffset="0"
  />

  <!-- marcações principais -->
  <line x1="16" y1="6.2" x2="16" y2="8.6"   stroke="#c8a96e" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="7.2" y1="9.8" x2="8.9" y2="11.4" stroke="#555"   stroke-width="1"   stroke-linecap="round"/>
  <line x1="24.8" y1="9.8" x2="23.1" y2="11.4" stroke="#555" stroke-width="1"   stroke-linecap="round"/>
  <line x1="5.2" y1="18"  x2="7.6"  y2="18"   stroke="#555"  stroke-width="1"   stroke-linecap="round"/>
  <line x1="26.8" y1="18" x2="24.4" y2="18"   stroke="#555"  stroke-width="1"   stroke-linecap="round"/>

  <!-- ponteiro inclinado para ~75% -->
  <line
    x1="16" y1="17.5"
    x2="22.5" y2="10.2"
    stroke="#c8a96e"
    stroke-width="1.6"
    stroke-linecap="round"
  />

  <!-- centro do ponteiro -->
  <circle cx="16" cy="17.5" r="2.2" fill="#0a0a0a" stroke="#c8a96e" stroke-width="1.2"/>
  <circle cx="16" cy="17.5" r="0.9" fill="#c8a96e"/>
</svg>
